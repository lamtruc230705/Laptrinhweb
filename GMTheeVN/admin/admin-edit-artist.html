<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sửa nghệ sĩ</title>

  <style>
    * { box-sizing: border-box; }
    body { background: #b3ebff; font-family: Arial, sans-serif; margin: 0; min-height: 100vh; }
    .container { background: #fff; max-width: 760px; margin: 40px auto; border-radius: 18px; box-shadow: 0 6px 24px #b3dde7c5; padding: 26px 40px 32px; }
    h2 { color: #2381da; display: flex; align-items: center; font-weight: 900; font-size: 2rem; margin: 0 0 20px; }
    h2::before { content: "🎭"; color: #53c1ff; font-size: 1.6rem; margin-right: 11px; font-weight: 900; }
    label { font-weight: 700; margin: 16px 0 7px; display: block; font-size: 1rem; color: #222; }
    input, textarea, select { width: 100%; padding: 13px 15px; border-radius: 9px; border: 1.5px solid #d7ecfa; font-size: 1rem; outline: none; background: #fafdff; font-family: inherit; }
    .form-btns { display: flex; gap: 18px; margin-top: 24px; }
    .form-btns button { flex: 1; border: none; font-size: 1.1em; padding: 13px 0; border-radius: 9px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .back-btn { background: #eee; color: #333; border: 1.5px solid #dadada !important; }
    .main-btn { background: #0c61d5; color: #fff; border: 1.5px solid #1763be !important; }
    .main-btn:disabled { opacity: .65; cursor: not-allowed; }
  </style>
</head>

<body>
  <div class="container">
    <h2>Sửa nghệ sĩ</h2>

    <form id="artistForm">
      <label for="stage_name">Nghệ danh</label>
      <input type="text" id="stage_name" placeholder="Ví dụ: Sơn Tùng M-TP" required>

      <label for="full_name">Họ tên đầy đủ</label>
      <input type="text" id="full_name" placeholder="Ví dụ: Nguyễn Thanh Tùng">

      <label for="user_id">Gmail tài khoản Artist</label>
      <select id="user_id" required>
        <option value="">-- Chọn Gmail tài khoản artist --</option>
      </select>

      <label for="artistImage">Ảnh nghệ sĩ hiện tại</label>
      <img id="preview-img" alt="Ảnh nghệ sĩ">
      <input type="file" id="artistImage" accept="image/*">

      <label for="birth_date">Ngày sinh</label>
      <input type="date" id="birth_date">

      <label for="artist_role">Vai trò / lĩnh vực</label>
      <input type="text" id="artist_role" placeholder="Ví dụ: Ca sĩ, diễn viên">

      <label for="height">Chiều cao</label>
      <input type="text" id="height" placeholder="Ví dụ: 170cm">

      <label for="weight">Cân nặng</label>
      <input type="text" id="weight" placeholder="Ví dụ: 60kg">

      <label for="partner_name">Partner</label>
      <input type="text" id="partner_name" placeholder="Ví dụ: Công ty quản lý / cộng sự">

      <label for="mascot">Linh vật</label>
      <input type="text" id="mascot" placeholder="Ví dụ: Mèo xanh">

      <label for="description">Mô tả</label>
      <textarea id="description" rows="3" placeholder="Mô tả ngắn về nghệ sĩ..."></textarea>

      <label for="works">Tác phẩm</label>
      <textarea id="works" rows="4" placeholder="Mỗi dòng một tác phẩm. Ví dụ:
Chúng ta của hiện tại | 2020
Muộn rồi mà sao còn | 2021"></textarea>

      <label for="status">Trạng thái</label>
      <select id="status">
        <option value="active">Hiển thị</option>
        <option value="hidden">Ẩn</option>
      </select>

      <div class="form-btns">
        <button type="button" class="back-btn" onclick="window.location.href='admin-artists.html'">← Quay lại</button>
        <button type="submit" class="main-btn">Lưu thay đổi</button>
      </div>
    </form>
  </div>

    <script src="../app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const artistId = Number(params.get('id'));

    function setValue(id, value) { document.getElementById(id).value = value ?? ''; }

    function normalizeWorksInput(works) {
      if (!Array.isArray(works)) return '';
      return works.map((w) => `${w.title || ''}${w.release_year ? ' | ' + w.release_year : ''}`.trim()).join('\n');
    }

    function parseWorksInput(text) {
      return String(text || '').split('\n').map((line) => line.trim()).filter(Boolean).map((line) => {
        const [title, year] = line.split('|').map((x) => x.trim());
        return { title, release_year: year ? Number(year) : null };
      });
    }

    async function loadArtistUserOptions(selectedUserId = null) {
      const usersRes = await APIClient.getAdminUsers();
      const userSelect = document.getElementById('user_id');
      userSelect.innerHTML = '<option value="">-- Chọn Gmail tài khoản artist --</option>';
      (usersRes?.data || []).filter((u) => u.role === 'artist').forEach((user) => {
        const option = document.createElement('option');
        option.value = String(user.id);
        option.textContent = user.email;
        if (Number(selectedUserId) === Number(user.id)) option.selected = true;
        userSelect.appendChild(option);
      });
    }

    async function loadArtistDetail() {
      if (!artistId) {
        alert('Thiếu id nghệ sĩ để chỉnh sửa.');
        window.location.href = 'admin-artists.html';
        return;
      }
      const res = await APIClient.getAdminArtist(artistId);
      const artist = res?.data || {};
      await loadArtistUserOptions(artist.user_id);
      setValue('stage_name', artist.stage_name);
      setValue('full_name', artist.full_name);
      setValue('birth_date', artist.birth_date ? String(artist.birth_date).slice(0, 10) : '');
      setValue('artist_role', artist.artist_role);
      setValue('height', artist.height);
      setValue('weight', artist.weight);
      setValue('partner_name', artist.partner_name);
      setValue('mascot', artist.mascot);
      setValue('description', artist.description);
      setValue('works', normalizeWorksInput(artist.works));
      setValue('status', artist.status || 'active');
      const preview = document.getElementById('preview-img');
      if (artist.image) { preview.src = APIClient.getImageUrl(artist.image); preview.style.maxWidth='180px'; }
    }

    document.getElementById('artistForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        stage_name: document.getElementById('stage_name').value.trim(),
        full_name: document.getElementById('full_name').value.trim(),
        user_id: Number(document.getElementById('user_id').value),
        birth_date: document.getElementById('birth_date').value || null,
        artist_role: document.getElementById('artist_role').value.trim(),
        height: document.getElementById('height').value.trim(),
        weight: document.getElementById('weight').value.trim(),
        partner_name: document.getElementById('partner_name').value.trim(),
        mascot: document.getElementById('mascot').value.trim(),
        description: document.getElementById('description').value.trim(),
        works: parseWorksInput(document.getElementById('works').value),
        status: document.getElementById('status').value
      };
      await APIClient.updateAdminArtist(artistId, payload);
      alert('Cập nhật nghệ sĩ thành công.');
      window.location.href='admin-artists.html';
    });

    document.addEventListener('DOMContentLoaded', loadArtistDetail);
  </script>


</body>
</html>
